        <ul>
          <li><a href="/arrival-fast-track/">Arrival Fast Track</a>: aircraft bridge or immigration-zone meeting, express immigration lane, terminal guidance, and delay monitoring.</li>
          <li><a href="/departure-vip/">Departure VIP Assistance</a>: terminal meeting, check-in support, priority immigration, security guidance, and gate escort.</li>
          <li><a href="/phuket-airport-fast-track-prices/">2026 Prices</a>: arrival from THB 1,600 per person, departure from THB 1,700 per person, combo from THB 3,100 per person.</li>
